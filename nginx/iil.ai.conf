# iil.ai — IIL Institut für Informationslogistik
# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name iil.ai www.iil.ai;
    return 301 https://iil.ai$request_uri;
}

# www → apex redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.iil.ai;

    ssl_certificate     /etc/letsencrypt/live/iil.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iil.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://iil.ai$request_uri;
}

# Main
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iil.ai;

    ssl_certificate     /etc/letsencrypt/live/iil.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iil.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/iil-ai/public;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(css|js|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    access_log /var/log/nginx/iil.ai.access.log;
    error_log  /var/log/nginx/iil.ai.error.log;
}
