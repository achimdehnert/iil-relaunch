name: Deploy iil.ai

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR=/opt/iil-ai
            PUBLIC_DIR=$DEPLOY_DIR/public
            REPO_URL=https://github.com/achimdehnert/iil-relaunch.git

            # Clone or pull latest
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd $DEPLOY_DIR && git pull origin main
            else
              sudo mkdir -p $DEPLOY_DIR
              sudo chown deploy:deploy $DEPLOY_DIR
              git clone $REPO_URL $DEPLOY_DIR
            fi

            # Ensure public dir exists and sync
            mkdir -p $PUBLIC_DIR
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='nginx' \
              --exclude='README.md' \
              $DEPLOY_DIR/ $PUBLIC_DIR/

            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ iil.ai deployed at $(date)"

      - name: Health check
        run: |
          sleep 5
          curl -f https://iil.ai/healthz || echo "⚠️ Health check failed (DNS may not be switched yet)"
