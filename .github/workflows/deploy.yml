name: Deploy iil.ai

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR=/opt/iil-ai-repo
            PUBLIC_DIR=/opt/iil-ai/public
            REPO_URL=https://github.com/achimdehnert/iil-relaunch.git

            # Clone or pull latest (public repo — no auth needed)
            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git pull origin main
            else
              git clone $REPO_URL $REPO_DIR
            fi

            # Sync files to public dir
            mkdir -p $PUBLIC_DIR
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='nginx' \
              --exclude='README.md' \
              $REPO_DIR/ $PUBLIC_DIR/

            # Reload nginx
            nginx -t && systemctl reload nginx
            echo "✅ iil.ai deployed at $(date)"

      - name: Health check
        run: |
          sleep 5
          curl -f https://iil.ai/healthz || echo "⚠️ Health check failed (DNS may not be switched yet)"
